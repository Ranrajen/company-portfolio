<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="author" content="OutPro India" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Title & SEO -->
    <title>OutPro India | Sports, Adventure & Corporate Event Management</title>
    <meta
      name="description"
      content="OutPro India is a professional sports, adventure, and corporate event management company. We organize corporate tournaments, college fests, marathons, sports leagues, adventure events, and customized event experiences across India."
    />
    <meta
      name="keywords"
      content="OutPro India, Sports Event Management, Corporate Events, Adventure Events, Tournament Management, College Fest, Sports League, Marathon Organizer, Event Management India"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://outproindia.com/" />

    <!-- Alternate Languages -->
    <link rel="alternate" hreflang="en" href="https://outproindia.com/" />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://outproindia.com/"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OutPro India" />
    <meta
      property="og:title"
      content="OutPro India | Sports & Event Management"
    />
    <meta
      property="og:description"
      content="Professional sports, adventure, and corporate event management services across India."
    />
    <meta property="og:url" content="https://outproindia.com/" />
    <meta property="og:image" content="https://outproindia.com/logo.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="OutPro India | Sports & Event Management"
    />
    <meta
      name="twitter:description"
      content="Professional sports, adventure, and corporate event management company."
    />
    <meta name="twitter:image" content="https://outproindia.com/logo.jpg" />
    <meta name="twitter:site" content="@OutProIndia" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "OutPro India",
        "url": "https://outproindia.com",
        "logo": "https://outproindia.com/logo.jpg",
        "description": "Professional sports, adventure, and corporate event management company in India",
        "slogan": "We Plan. You Celebrate.",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["English", "Hindi"]
        },
        "sameAs": [
          "https://www.facebook.com/outproindia",
          "https://www.instagram.com/outproindia",
          "https://www.linkedin.com/company/outproindia"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
